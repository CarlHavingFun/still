name: Still
options:
  bundleIdPrefix: com.still
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "G836GGPF7C"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": NO

configs:
  Debug: debug
  Release: release

schemes:
  Still:
    build:
      targets:
        Still: all
    run:
      config: Debug
    test:
      targets:
        - StillTests
        - StillUITests
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

targets:
  Still:
    type: application
    platform: iOS
    sources:
      - Still
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.still.app
        INFOPLIST_FILE: Still/Info.plist
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 1.0.1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CLANG_ENABLE_MODULES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        OTHER_LDFLAGS: "$(inherited) -lsqlite3"
    info:
      path: Still/Info.plist
      properties:
        CFBundleDisplayName: Still
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UIStatusBarStyle: UIStatusBarStyleDefault

  StillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - StillUITests
    dependencies:
      - target: Still
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.still.app.uitests
        INFOPLIST_FILE: StillUITests/Info.plist

  StillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StillTests
    dependencies:
      - target: Still
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.still.app.tests
        INFOPLIST_FILE: StillTests/Info.plist
